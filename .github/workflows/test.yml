name: Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: bats (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install chezmoi (Ubuntu)
        if: runner.os == 'Linux'
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Install chezmoi (macOS)
        if: runner.os == 'macOS'
        run: brew install chezmoi

      - name: Run tests
        run: ./tests/bats/bin/bats tests/lib tests/scripts tests/dotfiles
